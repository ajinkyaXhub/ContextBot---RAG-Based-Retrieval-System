services:
  - type: web
    name: contextbot
    runtime: python
    rootDir: backend
    buildCommand: cd ../frontend && npm install && npm run build && cd ../backend && pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: HF_API_KEY
        sync: false